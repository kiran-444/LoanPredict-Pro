<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Loan Approval Predictor | Dark Edition</title>
 <link rel="stylesheet" href="../static/css/style.css">
 
</head>
<body>

<div class="container">
  <h1>Loan Prediction</h1>
  <p class="subtitle">Enter applicant details to determine loan eligibility</p>

  <div class="card">
    <h2>Financial Details</h2>
    <div class="grid-3">
      <div class="field">
        <label>Applicant Income</label>
        <input type="number" id="Applicant_Income" placeholder="e.g. 50000">
      </div>
      <div class="field">
        <label>Co-Applicant Income</label>
        <input type="number" id="Coapplicant_Income" placeholder="0 if none">
      </div>
      <div class="field">
        <label>Credit Score</label>
        <input type="number" id="Credit_Score" placeholder="300-850">
      </div>
      <div class="field">
        <label>Loan Amount</label>
        <input type="number" id="Loan_Amount" placeholder="Requested sum">
      </div>
      <div class="field">
        <label>Loan Term</label>
        <input type="number" id="Loan_Term" placeholder="Months">
      </div>
      <div class="field">
        <label>DTI Ratio</label>
        <input type="number" step="0.01" id="DTI_Ratio" placeholder="e.g. 0.35">
      </div>
    </div>
  </div>

  <div class="card">
    <h2>Applicant Profile</h2>
    <div class="grid-2">
      <div class="field">
        <label>Age</label>
        <input type="number" id="Age" placeholder="Years">
      </div>
      <div class="field">
        <label>Dependents</label>
        <input type="number" id="Dependents" placeholder="0, 1, 2...">
      </div>
      <div class="field">
        <label>Existing Loans</label>
        <input type="number" id="Existing_Loans" placeholder="Count">
      </div>
      <div class="field">
        <label>Collateral Value</label>
        <input type="number" id="Collateral_Value" placeholder="Asset value">
      </div>
      <div class="field">
        <label>Savings</label>
        <input type="number" id="Savings" placeholder="Bank balance">
      </div>
      <div class="field">
        <label>Education Level</label>
        <select id="Education_Level">
          <option value="Graduate">Graduate</option>
          <option value="Not Graduate">Not Graduate</option>
        </select>
      </div>
    </div>
  </div>

  <div class="card">
    <h2>Classifications</h2>
    <div class="grid-3">
      <div class="field">
        <label>Employment</label>
        <select id="Employment_Status">
          <option value="Salaried">Salaried</option>
          <option value="Self-employed">Self-employed</option>
          <option value="Unemployed">Unemployed</option>
        </select>
      </div>
      <div class="field">
        <label>Marital Status</label>
        <select id="Marital_Status">
          <option value="Single">Single</option>
          <option value="Married">Married</option>
        </select>
      </div>
      <div class="field">
        <label>Loan Purpose</label>
        <select id="Loan_Purpose">
          <option value="Home">Home</option>
          <option value="Car">Car</option>
          <option value="Education">Education</option>
          <option value="Personal">Personal</option>
        </select>
      </div>
      <div class="field">
        <label>Property Area</label>
        <select id="Property_Area">
          <option value="Urban">Urban</option>
          <option value="Semiurban">Semiurban</option>
          <option value="Rural">Rural</option>
        </select>
      </div>
      <div class="field">
        <label>Gender</label>
        <select id="Gender">
          <option value="Male">Male</option>
          <option value="Female">Female</option>
        </select>
      </div>
      <div class="field">
        <label>Employer Type</label>
        <select id="Employer_Category">
          <option value="Private">Private</option>
          <option value="Government">Government</option>
          <option value="MNC">MNC</option>
          <option value="Unemployed">Unemployed</option>
        </select>
      </div>
    </div>
  </div>

  <button class="btn" id="predictBtn" onclick="checkLoan()">Analyze Application</button>
  <div id="errorMsg" class="error-msg"></div>

  <div id="result">
    <div class="result-title" id="resultTitle"></div>
    <div class="result-sub" id="resultSub"></div>
    <div class="bar-wrap"><div id="barFill" class="bar-fill"></div></div>
    <div class="bar-label" id="barLabel"></div>
  </div>
</div>

<script src="../static/js/script.js
"></script>

</body>
</html>
